<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 250" role="img" aria-labelledby="title desc">
  <title id="title">Urugero TV advertisement</title>
  <desc id="desc">Banner ad for Urugero TV videos and programs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".55" stop-color="#141414"/>
      <stop offset="1" stop-color="#b80000"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffd6d6"/>
    </linearGradient>
  </defs>
  <rect width="970" height="250" rx="24" fill="url(#bg)"/>
  <circle cx="836" cy="36" r="132" fill="#ffffff" fill-opacity=".08"/>
  <circle cx="658" cy="218" r="108" fill="#ffcc66" fill-opacity=".12"/>
  <g transform="translate(634 45)">
    <rect x="0" y="0" width="240" height="150" rx="20" fill="url(#screen)"/>
    <rect x="18" y="18" width="204" height="114" rx="12" fill="#111111"/>
    <path d="M104 55v40l34-20z" fill="#ffffff"/>
    <rect x="76" y="158" width="88" height="10" rx="5" fill="#ffffff" fill-opacity=".7"/>
  </g>
  <text x="54" y="72" fill="#ffdf7e" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">URUGERO TV</text>
  <text x="54" y="128" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="900">Amashusho mashya</text>
  <text x="56" y="166" fill="#e9eef5" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Ibiganiro, ubuhamya, sport n'amakuru ya Gospel kuri YouTube</text>
  <rect x="56" y="193" width="198" height="42" rx="21" fill="#ffffff"/>
  <text x="83" y="220" fill="#b80000" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="900">REBA VIDEOS</text>
</svg>
