<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="title desc">
  <title id="title">Urugero Gospel News advertisement</title>
  <desc id="desc">Square ad for Urugero Gospel News, TV and radio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".52" stop-color="#fff4f4"/>
      <stop offset="1" stop-color="#ffe3b0"/>
    </linearGradient>
    <linearGradient id="red" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e00000"/>
      <stop offset="1" stop-color="#8a0000"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#8a0000" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="600" height="600" rx="32" fill="url(#bg)"/>
  <circle cx="508" cy="84" r="96" fill="#b80000" fill-opacity=".1"/>
  <circle cx="86" cy="516" r="118" fill="#ffbf2f" fill-opacity=".18"/>
  <rect x="42" y="42" width="516" height="516" rx="28" fill="none" stroke="#b80000" stroke-width="7"/>
  <g filter="url(#shadow)">
    <circle cx="300" cy="178" r="96" fill="url(#red)"/>
    <circle cx="300" cy="178" r="116" fill="none" stroke="#b80000" stroke-opacity=".12" stroke-width="20"/>
    <path d="M273 121v114l90-57z" fill="#ffffff"/>
  </g>
  <text x="300" y="333" fill="#111111" font-family="Segoe UI, Arial, sans-serif" font-size="43" font-weight="900" text-anchor="middle">Urugero TV</text>
  <text x="300" y="382" fill="#b80000" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="900" text-anchor="middle">Gospel News</text>
  <text x="300" y="428" fill="#4b4b4b" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="750" text-anchor="middle">Amakuru • Radio • Sport • Ibiganiro</text>
  <rect x="136" y="482" width="328" height="60" rx="30" fill="#111111"/>
  <text x="300" y="520" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="900" text-anchor="middle">Kwamamaza hano</text>
</svg>
